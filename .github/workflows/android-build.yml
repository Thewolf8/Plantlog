name: 🏗️ Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # تشغيل يدوي من واجهة GitHub

jobs:
  build:
    name: HomeMed Cabinet APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      # ── 1. تحميل الكود ────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. إعداد بيئة جافا 21 ──────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      # ── 3. إعداد بيئة نود 22 ────────────────────────────────────
      - name: 🟢 Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # ── 4. تثبيت المكتبات (تم التغيير إلى npm install لحل مشكلة التزامن) ──
      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🔧 Install Capacitor CLI v8
        run: npm install --no-save @capacitor/cli@^8

      # ── 5. بناء تطبيق React ───────────────────────────────────
      - name: 🔨 Build web app
        run: npx vite build

      # ── 6. مزامنة Capacitor مع Android ───────────────────────
      - name: 🔄 Capacitor sync → Android
        run: npx cap sync android

      # ── 7. توليد أيقونات التطبيق من الـ Assets ──────────────────
      - name: 🎨 Generate app icons from Assets
        run: |
          npm install @capacitor/assets
          npx @capacitor/assets generate --android

      # ══════════════════════════════════════════════════════════
      #  8. بناء نسخة Release غير موقعة
      # ══════════════════════════════════════════════════════════
      - name: 📱 Build unsigned release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      # ── 9. رفع الـ APK الناتج كـ artifact ────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeMed-Cabinet-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
